on: 
  push:
    branches:
      - master
name: 🚀 Deploy website on push
jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v3
    
    - name: 📂 Sync files
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: 77.42.83.172
        username: ${{ secrets.TAZI_USERNAME }}
        password: ${{ secrets.TAZI_PASSWORD }}
        server-dir: /public_html/jobs/
        protocol: ftps




        


